        </a>

    <div class="navbar__contact">
      <span>919-961-8001</span>
      <span>jetstreamsurfacesolutions@gmail.com</span>
    </div>
  </div>
  <nav class="navbar__nav">
    <div class="nav-links">
      <a href="./about.html">About</a>
      <a href="./our_work.html">Our Work</a>

</header>

<div class="wrapper">

     <!-- ===== CONTACT FORM ===== -->
  <section class="contact-section" id="contact">
    <div class="contact-section__inner">
      <div class="contact-form-box" id="book">
        <h2 class="contact-form-box__title">CONTACT</h2>
        <form class="contact-form" id="contactForm">
          <div class="form-row">
            <div class="form-group">
              <label for="firstName">First Name</label>
              <input type="text" id="firstName" name="firstName" placeholder="John" required />
            </div>
            <div class="form-group">
              <label for="lastName">Last Name</label>
              <input type="text" id="lastName" name="lastName" placeholder="Doe" required />
            </div>
          </div>
          <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" placeholder="john@example.com" required />
          </div>
          <div class="form-group">
            <label for="phone">Phone</label>
            <input type="tel" id="phone" name="phone" placeholder="(919) 555-5555" />
          </div>
          <div class="form-group">
            <label for="service">Service Needed</label>
            <select id="service" name="service">
              <option value="">Select a service…</option>
              <option value="residential">Residential Washing</option>
              <option value="commercial">Commercial Washing</option>
              <option value="soft">Soft Washing</option>
              <option value="other">Other</option>
            </select>
          </div>
          <div class="form-group">
            <label for="message">Message</label>
            <textarea id="message" name="message" rows="4" placeholder="Tell us about your project…"></textarea>
          </div>
          <button type="submit" class="btn btn--primary btn--full">Schedule Now!</button>
          <div class="form-success" id="formSuccess">Thanks! We'll be in touch soon.</div>
        </form>
      </div>
    </div>
  </section>
</div>

      </div>
      <div class="footer__links">
        <a href="#about">About</a>
        <a href="#work">Our Work</a>

      </div>
      <div class="footer__contact">
      <span>919-961-8001</span>
      <span>jetstreamsurfacesolutions@gmail.com</span>
      </div>
    </div>
    <div class="footer__copy">© 2025 JetStream Surface Solutions. All rights reserved.</div>
  </footer>

</body>
